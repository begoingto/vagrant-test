- name: lookup valkey password
  ansible.builtin.set_fact:
    valkey_password: "{{ lookup('env', 'VALKEY_PASS') | default('valkey_pass', true) }}"
  no_log: true

- name: Install valkey package
  ansible.builtin.dnf:
    name: valkey
    state: present

- name: Ensure Valkey is running and enabled at boot
  ansible.builtin.service:
    name: valkey
    state: started
    enabled: yes
  no_log: true

- name: Create /etc/valkey directory
  ansible.builtin.file:
    path: /etc/valkey
    state: directory
    mode: "0755"

- name: Deploy valkey.conf with requirepass
  ansible.builtin.copy:
    content: |
      requirepass {{ valkey_password }}
      # optional: bind only localhost (more secure)
      bind 127.0.0.1
    dest: /etc/valkey/valkey.conf
    mode: "0600"
  notify: Restart Valkey
