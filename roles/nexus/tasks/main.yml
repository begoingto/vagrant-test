- name: Install Java 21 headless
  ansible.builtin.package:
    name: openjdk-21-jdk-headless
    state: present

- name: Discover the correct JAVA_HOME path dynamically
  ansible.builtin.shell: |
    readlink -f /usr/bin/javac | sed 's:/bin/javac::'
  register: java_home_path
  changed_when: false

- name: Set JAVA_HOME globally in /etc/environment
  ansible.builtin.lineinfile:
    path: /etc/environment
    regexp: "^JAVA_HOME="
    line: 'JAVA_HOME="{{ java_home_path.stdout }}"'
    state: present
    create: yes

- name: Also add JAVA bin to PATH (optional but recommended)
  ansible.builtin.lineinfile:
    path: /etc/environment
    regexp: "^PATH="
    line: 'PATH="{{ java_home_path.stdout }}/bin:{{ ansible_env.PATH }}"'
    state: present

- name: Reload environment for current session
  ansible.builtin.shell: |
    . /etc/environment
  args:
    executable: /bin/bash
  changed_when: false

- name: Create nexus system group
  ansible.builtin.group:
    name: "{{ nexus_group }}"
    state: present

- name: Create nexus system user
  ansible.builtin.user:
    name: "{{ nexus_user }}"
    group: "{{ nexus_group }}"
    home: "{{ nexus_install_dir }}"
    shell: /bin/false
    system: yes
    create_home: no

- name: Create directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ nexus_user }}"
    group: "{{ nexus_group }}"
    mode: "0755"
  loop:
    - "{{ nexus_install_dir }}"
    - "{{ nexus_data_dir }}"
    - "/opt/sonatype-work"

- name: "Download Nexus Repository Manager {{ nexus_version }}"
  when: first_download is defined
  ansible.builtin.get_url:
    url: "https://download.sonatype.com/nexus/3/nexus-{{ nexus_version }}-linux-{{ ansible_architecture }}.tar.gz"
    dest: "/tmp/nexus-{{ nexus_version }}-linux-{{ ansible_architecture }}.tar.gz"
    mode: "0644"
    checksum: "{{ nexus_checksum }}" # optional but recommended
  register: download_result

- name: Extract Nexus archive
  ansible.builtin.unarchive:
    src: "/tmp/nexus-{{ nexus_version }}-linux-{{ ansible_architecture }}.tar.gz"
    dest: "{{ nexus_install_dir }}"
    remote_src: yes
    extra_opts: [--strip-components=1]
    owner: "{{ nexus_user }}"
    group: "{{ nexus_group }}"
  when: download_result.changed

- name: Create symlink for easy management (nexus -> current version)
  when: false # skip if you want to keep versioned directories
  ansible.builtin.file:
    src: "{{ nexus_install_dir }}/nexus-{{ nexus_version }}"
    dest: "{{ nexus_install_dir }}/nexus"
    state: link
    owner: "{{ nexus_user }}"
    group: "{{ nexus_group }}"

- name: Create systemd service for Nexus
  ansible.builtin.template:
    src: nexus.service.j2
    dest: /etc/systemd/system/nexus.service
    mode: "0644"
  notify: Reload systemd

- name: Enable and start Nexus service
  ansible.builtin.systemd:
    name: nexus
    enabled: yes
    state: started
    daemon_reload: yes

- name: Configure Nexus data directory
  ansible.builtin.lineinfile:
    path: "{{ nexus_install_dir }}/nexus/etc/nexus.properties"
    regexp: "^application-data-dir="
    line: "application-data-dir={{ nexus_data_dir }}"
    create: yes
  notify: Restart Nexus
