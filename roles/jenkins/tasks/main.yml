- name: Update yum cache
  when: ansible_facts.os_family == "RedHat"
  ansible.builtin.dnf:
    update_cache: yes

- name: Add Jenkins repository
  ansible.builtin.get_url:
    url: https://pkg.jenkins.io/rpm/jenkins.repo
    dest: /etc/yum.repos.d/jenkins.repo
    mode: "0644"
    owner: root
    group: root
