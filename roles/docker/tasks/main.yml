- name: "Install exact Docker version {{docker_engine_version}}-1.amzn2023.0.2"
  ansible.builtin.dnf:
    name: "docker-{{docker_engine_version}}-1.amzn2023.0.2"
    state: present
    update_cache: yes
    allow_downgrade: yes

- name: Enable and start Docker service
  ansible.builtin.systemd:
    name: docker
    enabled: yes
    state: started
    daemon_reload: yes
  no_log: true

- name: Add current user to the docker group (non-root docker usage)
  ansible.builtin.user:
    name: "{{ ansible_user }}"
    groups: docker
    append: yes
  no_log: true

- name: Install python3-docker module for Ansible Docker modules
  ansible.builtin.dnf:
    name: python3-docker
    state: present

- name: Get docker compose version
  ansible.builtin.command: docker compose version --short
  register: get_docker_compose
  ignore_errors: true
  no_log: false

- name: Install Docker Compose V2 plugin (pinned version)
  when: get_docker_compose.stdout != docker_compose_version
  block:
    - name: Create Docker CLI plugins directory
      ansible.builtin.file:
        path: /usr/local/lib/docker/cli-plugins
        state: directory
        mode: "0755"

    - name: Download Docker Compose {{ docker_compose_version }}
      ansible.builtin.get_url:
        url: "https://github.com/docker/compose/releases/download/v{{ docker_compose_version }}/docker-compose-linux-{{ ansible_architecture | lower }}"
        dest: /usr/local/lib/docker/cli-plugins/docker-compose
        mode: "0755"
        force: yes
