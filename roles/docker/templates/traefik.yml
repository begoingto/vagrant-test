global:
  checkNewVersion: true
  sendAnonymousUsage: false
log:
  level: DEBUG
api:
  dashboard: true
  insecure: true
entryPoints:
  web:
    address: ":80"
  websecure:
    address: ":443"
  web-node-exporter:
    address: ":9100"
metrics:
  addInternals: true
  prometheus:
    addRoutersLabels: true
    addServicesLabels: true
    addEntryPointsLabels: true
    headerLabels:
      useragent: User-Agent
    buckets:
      - 0.1
      - 0.3
      - 1.2
      - 5.0
providers:
  swarm:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
