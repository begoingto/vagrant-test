- name: Create SSL directory
  ansible.builtin.file:
    path: "{{ kibana_ssl_dir }}"
    state: directory
    mode: "0755"
    owner: root
    group: kibana

- name: Generate 4096-bit RSA private key
  community.crypto.openssl_privatekey:
    path: "{{ kibana_ssl_dir }}/{{ kibana_ssl_filename }}.key"
    size: 4096
    type: RSA
    mode: "0600"
    owner: root
    group: kibana

- name: Generate CSR with exact subject and SAN (IP only)
  community.crypto.openssl_csr:
    path: "{{ kibana_ssl_dir }}/{{ kibana_ssl_filename }}.csr"
    privatekey_path: "{{ kibana_ssl_dir }}/{{ kibana_ssl_filename }}.key"
    digest: sha256
    subject:
      countryName: "KH"
      stateOrProvinceName: "PP"
      localityName: "Phnom Penh"
      organizationName: "BEGOINGTO Technology Co., Ltd."
      organizationalUnitName: "IT"
      commonName: "{{ ansible_host }}"
    subject_alt_name:
      - "DNS:localhost"
      - "IP:127.0.0.1"
      - "IP:{{ ansible_facts['default_ipv4']['address'] }}"
      - "IP:{{ ansible_host }}"
    mode: "0644"
    owner: root
    group: kibana

- name: Sign CSR with your own CA → create the final certificate
  community.crypto.x509_certificate:
    path: "{{ kibana_ssl_dir }}/{{ kibana_ssl_filename }}.crt"
    privatekey_path: "{{ kibana_ssl_dir }}/{{ kibana_ssl_filename }}.key"
    csr_path: "{{ kibana_ssl_dir }}/{{ kibana_ssl_filename }}.csr"
    provider: selfsigned
    selfsigned_digest: sha256
    selfsigned_not_before: "+0s"
    selfsigned_not_after: "+365d"
    mode: "0644"
    force: "{{ force_ca | bool }}"
    owner: root
    group: kibana

- name: Generate PKCS#12 file
  community.crypto.openssl_pkcs12:
    friendly_name: "Elastic SSL Certificate"
    path: "{{ kibana_ssl_dir }}/{{ kibana_ssl_filename }}.p12"
    privatekey_path: "{{ kibana_ssl_dir }}/{{ kibana_ssl_filename }}.key"
    certificate_path: "{{ kibana_ssl_dir }}/{{ kibana_ssl_filename }}.crt"
    passphrase: "{{ ca_key_pass }}"
    mode: "0644"
    force: "{{ force_ca | bool }}"
    owner: root
    group: kibana
  register: result_pkcs12

- name: Fetch {{ kibana_ssl_filename }}.crt to local
  ansible.builtin.fetch:
    src: "{{ kibana_ssl_dir }}/{{ kibana_ssl_filename }}.crt"
    dest: "{{ role_path }}/files/"
    flat: yes
