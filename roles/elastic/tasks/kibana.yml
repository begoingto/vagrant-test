- name: include tasks for repository setup
  ansible.builtin.include_tasks: repo.yml

- name: Install Kibana
  ansible.builtin.dnf:
    name: kibana-{{ elasticsearch_version }}
    state: present
    update_cache: yes
    enablerepo: elasticsearch

- name: Create SSL directory
  ansible.builtin.file:
    path: "{{ kibana_certs_dir }}"
    state: directory
    mode: "0750"
    owner: root
    group: kibana

- name: Copy elasticsearch CA certificate to Kibana
  ansible.builtin.copy:
    src: "{{ role_path }}/files/elasticsearch.crt"
    dest: "{{ kibana_certs_dir  }}/elasticsearch.pem"
    owner: root
    group: kibana
    mode: "0750"

- name: include tasks for Kibana SSL certificate generation
  ansible.builtin.include_tasks: kibana-openssl.yml

- name: Configure kibana.yml
  ansible.builtin.template:
    src: kibana.yml.j2
    dest: /etc/kibana/kibana.yml
  notify: Restart Kibana

- name: Enable and start Elastic Kibana service
  become: true
  ansible.builtin.systemd:
    name: kibana
    enabled: yes
    state: started
    daemon_reload: yes
  no_log: true

- name: Wait for Elasticsearch to be up
  ansible.builtin.wait_for:
    host: "{{ ansible_host }}"
    port: 5601
    delay: 10
    timeout: 300
  register: wait_result
  until: wait_result is success
