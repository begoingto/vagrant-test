- name: Install java-21-amazon-corretto
  ansible.builtin.dnf:
    name: java-21-amazon-corretto
    state: present
    update_cache: yes

- name: include tasks for repository setup
  ansible.builtin.include_tasks: repo.yml

- name: Install Logstash
  ansible.builtin.dnf:
    name: logstash-{{ elasticsearch_version }}
    state: present
    update_cache: yes
    enablerepo: elasticsearch

- name: include tasks SSL certificate
  ansible.builtin.include_tasks: logstash-openssl.yml

- name: Configure Logstash (logstash.yml)
  ansible.builtin.template:
    src: logstash.yml.j2
    dest: /etc/logstash/logstash.yml
    mode: "0644"
  notify: Restart Logstash

- name: Enable and start Elastic Logstash service
  ansible.builtin.systemd:
    name: logstash
    enabled: yes
    state: started
    daemon_reload: yes
  no_log: true

