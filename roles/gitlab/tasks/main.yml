- name: Install prerequisites
  ansible.builtin.dnf:
    name:
      - policycoreutils
      - openssh-clients
      - perl
      - postfix
      - cronie
    state: present

- name: Download the GitLab repository setup script
  ansible.builtin.get_url:
    url: https://packages.gitlab.com/install/repositories/gitlab/gitlab-ce/script.rpm.sh
    dest: /tmp/gitlab-ce-repo-setup.sh
    mode: "0755"

- name: Execute the GitLab repository setup script
  ansible.builtin.command: /tmp/gitlab-ce-repo-setup.sh
  args:
    creates: /etc/yum.repos.d/gitlab_gitlab-ce.repo
  environment:
    os: "{{ ansible_facts['distribution'] | lower }}"
    dist: "{{ ansible_facts['distribution_major_version'] }}"
  changed_when: false

- name: Clean up the setup script (optional)
  ansible.builtin.file:
    path: /tmp/gitlab-ce-repo-setup.sh
    state: absent

- name: Install GitLab CE
  ansible.builtin.dnf:
    name: "gitlab-ce-18.10.0-ce.0.amazon2023"
    state: present
    disable_gpg_check: false
  environment:
    EXTERNAL_URL: "{{ ansible_host }}:5050"
    GITLAB_ROOT_EMAIL: "begoingto.me@gmail.com"

- name: Ensure GitLab is enabled and started
  ansible.builtin.service:
    name: gitlab-runsvdir
    state: started
    enabled: true
  no_log: true
