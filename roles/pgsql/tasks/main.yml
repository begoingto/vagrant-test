- name: Install PostgreSQL 17
  ansible.builtin.dnf:
    name: postgresql17-server
    state: present

- name: Initialize PostgreSQL database
  ansible.builtin.shell: |
    systemctl stop postgresql || true
    rm -rf /var/lib/pgsql/data
    postgresql-setup --initdb
    systemctl enable --now postgresql
  args:
    creates: /var/lib/pgsql/data/pg_hba.conf
  register: initdb_result
  changed_when: initdb_result.rc == 0
  no_log: false

- name: Deploy custom pg_hba.conf from template
  ansible.builtin.template:
    src: pg_hba.conf.j2
    dest: /var/lib/pgsql/data/pg_hba.conf
    owner: postgres
    group: postgres
    mode: "0600"
    backup: yes
  notify: Restart PostgreSQL

- name: Ensure PostgreSQL is running and enabled
  ansible.builtin.service:
    name: postgresql
    state: started
    enabled: yes
  no_log: true

- name: Fetch the config file
  when: false
  ansible.builtin.fetch:
    src: /var/lib/pgsql/data/postgresql.conf
    dest: "{{ role_path }}/files/postgresql.conf"
    flat: yes

- name: template replace postgresql.conf
  ansible.builtin.template:
    src: postgresql.conf.j2
    dest: /var/lib/pgsql/data/postgresql.conf
    owner: postgres
    group: postgres
    mode: "0600"
    backup: yes
  notify: Restart PostgreSQL

- name: include role elastic for repository setup
  ansible.builtin.include_role:
    name: elastic
    tasks_from: repo

- name: Install Elastic-agent
  become: true
  ansible.builtin.dnf:
    name: elastic-agent-9.3.2
    state: present
    update_cache: yes
    enablerepo: elasticsearch

- name: Fetch the elastic-agent.yml file
  when: false
  ansible.builtin.fetch:
    src: /etc/elastic-agent/elastic-agent.yml
    dest: "{{ role_path }}/files/elastic-agent.yml"
    flat: yes

- name: Create directory for elastic-agent certs
  ansible.builtin.file:
    path: /etc/elastic-agent/certs
    state: directory

- name: Copy pem from file to the host
  ansible.builtin.copy:
    src: "{{ role_path }}/files/elastic-stack-ca.pem"
    dest: /etc/elastic-agent/certs/elastic-stack-ca.pem
    owner: root
    group: root
    mode: "0644"

- name: Deploy elastic-agent.yml from template
  ansible.builtin.template:
    src: elastic-agent.yml.j2
    dest: /etc/elastic-agent/elastic-agent.yml
    owner: root
    group: root
    mode: "0644"
  notify: Restart Elastic-agent
