- name: Setup common configurations
  hosts: all
  become: yes
  roles:
    - common

- name: Setup PostgreSQL 17
  hosts: all
  become: yes
  roles:
    - pgsql
  tags:
    - pgsql

- name: Setup Valkey
  hosts: all
  become: yes
  roles:
    - valkey
  tags:
    - valkey

- name: Setup GitLab CE
  hosts: all
  become: yes
  roles:
    - gitlab
  tags:
    - gitlab
